<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Research Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }
        
        .header {
            background: #161b22;
            padding: 20px;
            border-bottom: 1px solid #30363d;
            text-align: center;
        }
        
        .header h1 {
            color: #58a6ff;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #8b949e;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #58a6ff;
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: #8b949e;
        }
        
        .search-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .search-section h2 {
            color: #58a6ff;
            margin-bottom: 15px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 16px;
        }
        
        .search-box button {
            padding: 12px 24px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .search-box button:hover {
            background: #2ea043;
        }
        
        .filter-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-section select {
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
        }
        
        .results {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        
        .results h2 {
            color: #58a6ff;
            margin-bottom: 15px;
        }
        
        .code-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .code-item h3 {
            color: #7ee787;
            margin-bottom: 8px;
        }
        
        .code-item .meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #8b949e;
        }
        
        .code-item .meta span {
            background: #21262d;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .code-item .complexity-einfach {
            color: #3fb950;
        }
        
        .code-item .complexity-mittel {
            color: #d29922;
        }
        
        .code-item .complexity-komplex {
            color: #f85149;
        }
        
        .code-item pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 15px;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            color: #e6edf3;
        }
        
        .code-item .description {
            margin-top: 10px;
            color: #8b949e;
            font-style: italic;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .error {
            background: #f8514920;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 16px;
        }
        
        .tab.active {
            color: #58a6ff;
            border-bottom: 2px solid #58a6ff;
        }
        
        .tab:hover {
            color: #c9d1d9;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Machine Research Database</h1>
        <p>Code-Wissensdatenbank für Machine v0.1</p>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3 id="code-count">-</h3>
                <p>Code Examples</p>
            </div>
            <div class="stat-card">
                <h3 id="research-count">-</h3>
                <p>Research Findings</p>
            </div>
            <div class="stat-card">
                <h3 id="test-count">-</h3>
                <p>Test Results</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('code')">Code Examples</button>
            <button class="tab" onclick="switchTab('research')">Research Findings</button>
            <button class="tab" onclick="switchTab('tests')">Test Results</button>
        </div>
        
        <div class="search-section">
            <h2>🔍 Suche</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Suche nach Code, Algorithmen, Themen...">
                <button onclick="search()">Suchen</button>
            </div>
            <div class="filter-section">
                <select id="complexity-filter">
                    <option value="">Alle Komplexitäten</option>
                    <option value="einfach">Einfach</option>
                    <option value="mittel">Mittel</option>
                    <option value="komplex">Komplex</option>
                </select>
                <select id="topic-filter">
                    <option value="">Alle Themen</option>
                    <option value="k-NN">k-NN Algorithmus</option>
                    <option value="Mathematik">Mathematische Operationen</option>
                    <option value="Bildverarbeitung">Bildverarbeitung</option>
                    <option value="Audioverarbeitung">Audioverarbeitung</option>
                </select>
            </div>
        </div>
        
        <div class="results" id="results">
            <h2>📁 Ergebnisse</h2>
            <div class="loading">Lade Daten...</div>
        </div>
    </div>
    
    <script>
        // Qdrant Konfiguration
        const QDRANT_HOST = '187.77.67.80';
        const QDRANT_PORT = '32773';
        const QDRANT_API_KEY = 'qJ4icfeaDcrK7p4sX91sIb4gh7H61GFU';
        
        let currentTab = 'code';
        let allData = {
            code: [],
            research: [],
            tests: []
        };
        
        // Initialisierung
        async function init() {
            await loadStats();
            await loadAllData();
            displayResults();
        }
        
        // Statistiken laden
        async function loadStats() {
            try {
                const collections = ['code_examples', 'research_findings', 'test_results'];
                const counts = {};
                
                for (const collection of collections) {
                    const response = await fetch(`http://${QDRANT_HOST}:${QDRANT_PORT}/collections/${collection}`, {
                        headers: {
                            'Authorization': `Bearer ${QDRANT_API_KEY}`
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        counts[collection] = data.result.points_count;
                    }
                }
                
                document.getElementById('code-count').textContent = counts['code_examples'] || 0;
                document.getElementById('research-count').textContent = counts['research_findings'] || 0;
                document.getElementById('test-count').textContent = counts['test_results'] || 0;
                
            } catch (error) {
                console.error('Fehler beim Laden der Statistiken:', error);
            }
        }
        
        // Alle Daten laden
        async function loadAllData() {
            try {
                // Code Examples laden
                const codeResponse = await fetch(`http://${QDRANT_HOST}:${QDRANT_PORT}/collections/code_examples/points/scroll`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${QDRANT_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        limit: 100,
                        with_payload: true,
                        with_vector: false
                    })
                });
                
                if (codeResponse.ok) {
                    const codeData = await codeResponse.json();
                    allData.code = codeData.result.points || [];
                }
                
                // Research Findings laden
                const researchResponse = await fetch(`http://${QDRANT_HOST}:${QDRANT_PORT}/collections/research_findings/points/scroll`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${QDRANT_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        limit: 100,
                        with_payload: true,
                        with_vector: false
                    })
                });
                
                if (researchResponse.ok) {
                    const researchData = await researchResponse.json();
                    allData.research = researchData.result.points || [];
                }
                
                // Test Results laden
                const testResponse = await fetch(`http://${QDRANT_HOST}:${QDRANT_PORT}/collections/test_results/points/scroll`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${QDRANT_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        limit: 100,
                        with_payload: true,
                        with_vector: false
                    })
                });
                
                if (testResponse.ok) {
                    const testData = await testResponse.json();
                    allData.tests = testData.result.points || [];
                }
                
            } catch (error) {
                console.error('Fehler beim Laden der Daten:', error);
                document.getElementById('results').innerHTML = `
                    <div class="error">
                        ❌ Fehler beim Laden der Daten. Bitte prüfe die Qdrant-Verbindung.
                        <br>Fehler: ${error.message}
                    </div>
                `;
            }
        }
        
        // Ergebnisse anzeigen
        function displayResults() {
            const resultsDiv = document.getElementById('results');
            let data = [];
            let title = '';
            
            switch(currentTab) {
                case 'code':
                    data = allData.code;
                    title = '💻 Code Examples';
                    break;
                case 'research':
                    data = allData.research;
                    title = '📚 Research Findings';
                    break;
                case 'tests':
                    data = allData.tests;
                    title = '🧪 Test Results';
                    break;
            }
            
            if (data.length === 0) {
                resultsDiv.innerHTML = `
                    <h2>${title}</h2>
                    <div class="loading">Keine Daten vorhanden. Der Researcher muss noch Code sammeln.</div>
                `;
                return;
            }
            
            let html = `<h2>${title} (${data.length} Einträge)</h2>`;
            
            data.forEach(item => {
                const payload = item.payload;
                
                if (currentTab === 'code') {
                    html += `
                        <div class="code-item">
                            <h3>${payload.title || 'Unbenannt'}</h3>
                            <div class="meta">
                                <span class="complexity-${payload.complexity}">${payload.complexity}</span>
                                <span>${payload.topic}</span>
                                <span>${payload.language}</span>
                            </div>
                            <pre><code>${escapeHtml(payload.code)}</code></pre>
                            <div class="description">${payload.description}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="code-item">
                            <h3>${payload.topic || payload.title || 'Unbenannt'}</h3>
                            <div class="meta">
                                <span>${payload.source}</span>
                                <span>${new Date(payload.created_at).toLocaleDateString()}</span>
                            </div>
                            <div class="description">${JSON.stringify(payload, null, 2)}</div>
                        </div>
                    `;
                }
            });
            
            resultsDiv.innerHTML = html;
        }
        
        // Tab wechseln
        function switchTab(tab) {
            currentTab = tab;
            
            // Tabs aktualisieren
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            displayResults();
        }
        
        // Suche
        function search() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const complexity = document.getElementById('complexity-filter').value;
            const topic = document.getElementById('topic-filter').value;
            
            // Filter anwenden
            let data = allData[currentTab];
            
            if (query) {
                data = data.filter(item => {
                    const payload = item.payload;
                    return JSON.stringify(payload).toLowerCase().includes(query);
                });
            }
            
            if (complexity) {
                data = data.filter(item => item.payload.complexity === complexity);
            }
            
            if (topic) {
                data = data.filter(item => item.payload.topic === topic);
            }
            
            // Gefilterte Ergebnisse anzeigen
            const resultsDiv = document.getElementById('results');
            let title = '';
            
            switch(currentTab) {
                case 'code': title = '💻 Code Examples'; break;
                case 'research': title = '📚 Research Findings'; break;
                case 'tests': title = '🧪 Test Results'; break;
            }
            
            if (data.length === 0) {
                resultsDiv.innerHTML = `
                    <h2>${title}</h2>
                    <div class="loading">Keine Ergebnisse für diese Suche.</div>
                `;
                return;
            }
            
            let html = `<h2>${title} (${data.length} gefiltert)</h2>`;
            
            data.forEach(item => {
                const payload = item.payload;
                
                if (currentTab === 'code') {
                    html += `
                        <div class="code-item">
                            <h3>${payload.title || 'Unbenannt'}</h3>
                            <div class="meta">
                                <span class="complexity-${payload.complexity}">${payload.complexity}</span>
                                <span>${payload.topic}</span>
                                <span>${payload.language}</span>
                            </div>
                            <pre><code>${escapeHtml(payload.code)}</code></pre>
                            <div class="description">${payload.description}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="code-item">
                            <h3>${payload.topic || payload.title || 'Unbenannt'}</h3>
                            <div class="meta">
                                <span>${payload.source}</span>
                                <span>${new Date(payload.created_at).toLocaleDateString()}</span>
                            </div>
                            <div class="description">${JSON.stringify(payload, null, 2)}</div>
                        </div>
                    `;
                }
            });
            
            resultsDiv.innerHTML = html;
        }
        
        // HTML escapen
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialisierung beim Laden
        init();
    </script>
</body>
</html>
