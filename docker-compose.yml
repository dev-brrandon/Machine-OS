version: '3.8'

services:
  openclaw-agents:
    image: ubuntu:22.04
    container_name: openclaw-agents
    privileged: true
    cgroup: host
    restart: unless-stopped
    ports:
      - "32774:18800"    # OpenClaw Gateway
      - "32776:22"       # SSH für Zugriff
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - openclaw-data:/data
    environment:
      - TZ=Europe/Berlin
    command: >
      bash -c "
        # System-Tools installieren
        apt-get update && 
        apt-get install -y systemd systemd-sysv curl git python3 npm ssh openssh-server &&
        
        # SSH konfigurieren
        mkdir -p /root/.ssh &&
        echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILGluwDpmjazbmStJgbLFqjB/pNejsNxkmfO2Rv8z3BR openclaw-agent' > /root/.ssh/authorized_keys &&
        chmod 700 /root/.ssh &&
        chmod 600 /root/.ssh/authorized_keys &&
        
        # SSH-Server konfigurieren
        echo 'PermitRootLogin prohibit-password' >> /etc/ssh/sshd_config &&
        echo 'PasswordAuthentication no' >> /etc/ssh/sshd_config &&
        service ssh start &&
        
        # OpenClaw installieren
        npm install -g openclaw &&
        
        # Systemd starten
        /sbin/init
      "
    networks:
      - openclaw-network

  qdrant-agents:
    image: qdrant/qdrant:latest
    container_name: qdrant-agents
    ports:
      - "32775:6333"     # Qdrant für Sub-Agenten
    volumes:
      - qdrant-agents-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=qJ4icfeaDcrK7p4sX91sIb4gh7H61GFU
    networks:
      - openclaw-network

volumes:
  openclaw-data:
  qdrant-agents-storage:

networks:
  openclaw-network:
    driver: bridge
