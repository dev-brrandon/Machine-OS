version: '3.8'

services:
  openclaw-agents:
    image: ubuntu:22.04
    container_name: openclaw-agents
    privileged: true
    cgroup: host
    restart: unless-stopped
    ports:
      - "32774:18800"    # OpenClaw Gateway
      - "32776:22"       # SSH für Zugriff
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - openclaw-data:/data
    environment:
      - TZ=Europe/Berlin
    command: >
      bash -c "
        apt-get update && 
        apt-get install -y systemd systemd-sysv curl git python3 npm ssh openssh-server &&
        echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
        echo 'root:openclaw123' | chpasswd &&
        service ssh start &&
        npm install -g openclaw &&
        /sbin/init
      "
    networks:
      - openclaw-network

  qdrant-agents:
    image: qdrant/qdrant:latest
    container_name: qdrant-agents
    ports:
      - "32775:6333"     # Qdrant für Sub-Agenten
    volumes:
      - qdrant-agents-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=qJ4icfeaDcrK7p4sX91sIb4gh7H61GFU
    networks:
      - openclaw-network

volumes:
  openclaw-data:
  qdrant-agents-storage:

networks:
  openclaw-network:
    driver: bridge
