services:
  openclaw:
    image: ubuntu:22.04
    container_name: openclaw-agents
    privileged: true
    cgroup: host
    restart: unless-stopped
    ports:
      - "18800:18800"
      - "18801:22"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - openclaw-data:/data
    environment:
      - TZ=Europe/Berlin
    # Erst systemd starten, dann OpenClaw installieren
    entrypoint: |
      bash -c "
        apt-get update && 
        apt-get install -y systemd systemd-sysv curl git python3 npm ssh openssh-server &&
        echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
        echo 'root:openclaw123' | chpasswd &&
        service ssh start &&
        npm install -g openclaw || curl -fsSL https://install.openclaw.ai | bash
        exec /sbin/init
      "
    networks:
      - openclaw-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=qJ4icfeaDcrK7p4sX91sIb4gh7H61GFU
    networks:
      - openclaw-network

volumes:
  openclaw-data:
  qdrant-storage:

networks:
  openclaw-network:
    driver: bridge
