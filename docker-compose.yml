version: '3.8'

services:
  openclaw-agents:
    image: ubuntu:22.04
    container_name: openclaw-agents
    privileged: true
    cgroup: host
    restart: unless-stopped
    ports:
      - "32776:22"       # Nur SSH
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - openclaw-data:/data
    environment:
      - TZ=Europe/Berlin
    command: >
      bash -c "
        apt-get update && 
        apt-get install -y systemd systemd-sysv ssh openssh-server curl &&
        
        # SSH-Key für Klaw hinzufügen
        mkdir -p /root/.ssh &&
        echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILGluwDpmjazbmStJgbLFqjB/pNejsNxkmfO2Rv8z3BR openclaw-agent' > /root/.ssh/authorized_keys &&
        chmod 700 /root/.ssh &&
        chmod 600 /root/.ssh/authorized_keys &&
        
        # SSH konfigurieren
        echo 'PermitRootLogin prohibit-password' >> /etc/ssh/sshd_config &&
        echo 'PasswordAuthentication no' >> /etc/ssh/sshd_config &&
        service ssh start &&
        
        # Systemd starten (hält Container am Leben)
        /sbin/init
      "
    networks:
      - openclaw-network

volumes:
  openclaw-data:

networks:
  openclaw-network:
    driver: bridge
